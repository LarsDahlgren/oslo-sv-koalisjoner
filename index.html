<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Flertallskalkulator årsmøte Oslo SV</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 700px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    min-height: auto;
}

h1 {
    margin-top: 0;
    font-size: 1.6em;
    text-align: center;
    color: #2c3e50;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 6px;
    margin-top: 15px;
}

label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 0.95em;
    background: #fafafa;
    border: 1px solid #ddd;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
}

label:hover {
    background: #f0f0f0;
    border-color: #ccc;
}

input[type="checkbox"] {
    margin-right: 6px;
    transform: scale(1.1);
}

.progress-container {
    margin-top: 20px;
    background: #eee;
    height: 22px;
    border-radius: 8px;
    overflow: hidden;
}

.progress {
    height: 100%;
    width: 0%;
    background: #c0392b;
    transition: width 0.3s, background 0.3s;
}

button {
    margin-top: 12px;
    margin-right: 8px;
    padding: 14px 24px;
    border: none;
    background: #2980b9;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    font-size: 1.1em;
    font-weight: bold;
    transition: background 0.2s, transform 0.1s;
}

button:hover {
    background: #1c5980;
    transform: translateY(-1px);
}

#status {
    font-weight: bold;
    margin-top: 8px;
}

#suggestions {
    margin-top: 12px;
    font-size: 0.9em;
}

@media (max-width: 500px) {
    .container {
        width: 95%;
        min-height: 90vh;
        margin: 10px auto;
        padding: 15px;
    }
    .grid {
        grid-template-columns: 1fr;
    }
    label {
        font-size: 0.9em;
        padding: 5px 8px;
    }
    h1 {
        font-size: 1.3em;
    }
    .progress-container {
        height: 18px;
    }
    button {
        font-size: 1.2em;
        padding: 16px 28px;
        width: 100%;
        margin-right: 0;
        margin-top: 10px;
    }
}
</style>
</head>
<body>

<div class="container">

<h1>Flertallskalkulator årsmøte Oslo SV</h1>

Totalt delegater: <b id="total"></b> |
Flertallsgrense: <b id="majority"></b>

<div class="grid" id="delegates"></div>

<div class="progress-container">
<div class="progress" id="progress"></div>
</div>

<p>
Valgte delegater: <b id="selected">0</b><br>
Delegater som mangler til flertall: <b id="missing"></b>
</p>

<p id="status"></p>

<button onclick="reset()">Nullstill</button>
<button onclick="suggestAlna()">Koalisjoner med Alna</button>

<div id="suggestions"></div>

</div>

<script>
// Delegatdata
const data = [
    ["Stortingsgruppa", 2],
    ["Oslo Studentlag", 4],
    ["Stovner", 4],
    ["Ullern", 4],
    ["Grorud", 5],
    ["Bjerke", 6],
    ["Vestre Aker", 6],
    ["Bystyregruppa", 6],
    ["Alna", 7],
    ["Nordstrand", 7],
    ["Søndre Nordstrand", 7],
    ["Frogner", 9],
    ["Nordre Aker", 10],
    ["Østensjø", 10],
    ["St. Hanshaugen", 11],
    ["Fylkesstyret", 12],
    ["Sagene", 16],
    ["Grünerløkka", 18],
    ["Gamle Oslo", 26],
    ["Oslo SU", 10]
];

// Kalkulasjon av totals
const totalDelegates = data.reduce((sum,d)=>sum+d[1],0);
const majorityThreshold = Math.floor(totalDelegates/2)+1;

document.getElementById("total").textContent = totalDelegates;
document.getElementById("majority").textContent = majorityThreshold;

// Lag delegat-checkboxes
const delegatesDiv = document.getElementById("delegates");
data.forEach(d => {
    const label = document.createElement("label");
    label.innerHTML = `<input type="checkbox" value="${d[1]}"> ${d[0]} (${d[1]})`;
    delegatesDiv.appendChild(label);
});

// Oppdatering av fremdrift
function updateProgress() {
    const checkboxes = document.querySelectorAll("#delegates input");
    let selected = 0;
    checkboxes.forEach(cb => {
        if(cb.checked) selected += parseInt(cb.value);
    });
    document.getElementById("selected").textContent = selected;
    const missing = Math.max(0, majorityThreshold - selected);
    document.getElementById("missing").textContent = missing;
    document.getElementById("progress").style.width = `${Math.min(100,(selected/majorityThreshold)*100)}%`;
    document.getElementById("progress").style.background = selected>=majorityThreshold ? "#27ae60" : "#c0392b";
    document.getElementById("status").textContent = selected>=majorityThreshold ? "Flertall oppnådd!" : "Flertall ikke oppnådd";
}

document.querySelectorAll("#delegates input").forEach(cb=>{
    cb.addEventListener("change", updateProgress);
});

// Nullstill knapp
function reset() {
    document.querySelectorAll("#delegates input").forEach(cb=>cb.checked=false);
    updateProgress();
    document.getElementById("suggestions").innerHTML="";
}

// Alna-koalisjonsforslag
function suggestAlna() {
    const results = [];
    const alna = {name:"Alna", votes:7};
    const others = data.filter(d=>d[0]!=="Alna").map(d=>({name:d[0], votes:d[1]}));

    function combinations(arr,start,combo){
        let coalition = [alna,...combo];
        let sum = coalition.reduce((a,b)=>a+b.votes,0);
        if(sum>=majorityThreshold){
            results.push(coalition.slice());
            return;
        }
        for(let i=start;i<arr.length;i++){
            combinations(arr,i+1,[...combo,arr[i]]);
        }
    }

    combinations(others,0,[]);

    results.sort((a,b)=>{
        let sa=a.reduce((x,y)=>x+y.votes,0);
        let sb=b.reduce((x,y)=>x+y.votes,0);
        return sa-sb;
    });

    const container = document.getElementById("suggestions");
    container.innerHTML="Flertallskoalisjoner som inkluderer Alna:<br>";
    results.slice(0,15).forEach(r=>{
        let names = r.map(x=>x.name).join(", ");
        let votes = r.reduce((x,y)=>x+y.votes,0);
        container.innerHTML+=`${votes} delegater: ${names}<br>`;
    });
}

updateProgress();
</script>

</body>
</html>
